<div style="min-height: 100vh; background-image: url('https://media.istockphoto.com/id/92694286/photo/address-book-pen-address-book-and-pen.jpg?s=612x612&w=0&k=20&c=zgEIvvPj2tvv88Q3YwbZbX5otCpfSOtpLZZYSYfhqq0='); background-size: cover; background-position: center; background-repeat: no-repeat; display: flex; justify-content: center; align-items: center;">
  <div class="container-fluid px-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-warning mb-0">Usuarios Inscritos</h2>
    <button class="btn btn-warning" routerLink="/inscripcion">
      ➕ Nueva Inscripción
    </button>
  </div>

  <!-- Mensaje si la lista está vacía -->
  <div *ngIf="inscritos.length === 0" class="alert alert-dark text-center text-muted">
    No hay usuarios inscritos en el gimnasio todavía.
  </div>

  <!-- Tabla con la lista de usuarios -->
  <div *ngIf="inscritos.length > 0" class="table-responsive">
    <table class="table table-dark table-striped table-hover align-middle border-warning">
      <thead class="table-warning text-dark">
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Rutina</th>
          <th>Horario</th>
          <th>Email</th>
          <th class="text-center">Acciones</th> 
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let usuario of inscritos; let i = index">
          <td>{{ i + 1 }}</td>
          <td class="fw-bold">{{ usuario.nombre }}</td>
          <td>
            <span class="badge bg-warning text-dark text-uppercase p-2">{{ usuario.rutina }}</span>
          </td>
          <td>{{ usuario.horario }}</td>
          <td class="text-white">{{ usuario.email }}</td>
          <td class="text-center">
            <button class="btn btn-danger btn-sm" (click)="eliminarInscrito(i)">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
